output_dir = "data"

[script_generation]
base_url = "https://integrate.api.nvidia.com/v1"
api_key_env = "LLM_API_KEY"
model = "replace-with-nim-model"
requests_per_minute = 35
conversations_per_request = 5
progress_every = 500
max_retries = 3
topics = [
  "making evening plans",
  "fixing a work proposal",
  "switching careers",
  "a strange conference story",
  "planning a weekend trip",
]

[dia]
model_id = "nari-labs/Dia-1.6B"
sample_rate = 44100
output_sample_rate = 24000
precision = "bfloat16"
compile = true
duration_regen_limit = 2

[overlap]
target_hours = 200.0
backchannel_ratio = 0.70
interruption_ratio = 0.25
simultaneous_start_ratio = 0.05
overlap_attenuation = 0.82

[mimi]
model_id = "kyutai/mimi"
training_codebooks = 8
token_count = 2048

[huggingface]
repo_env = "HF_DATASET_REPO"
token_env = "HF_TOKEN"

[[buckets]]
name = "short"
count = 15000
turn_min = 4
turn_max = 6
duration_min_sec = 12
duration_max_sec = 20
duration_avg_sec = 16
words_min = 28
words_max = 55
description = "Fast alternation, greetings, quick plans, yes/no exchanges."

[[buckets]]
name = "medium"
count = 20000
turn_min = 6
turn_max = 8
duration_min_sec = 25
duration_max_sec = 40
duration_avg_sec = 30
words_min = 70
words_max = 115
description = "Natural conversational flow and main workhorse examples."

[[buckets]]
name = "long"
count = 10000
turn_min = 8
turn_max = 10
duration_min_sec = 40
duration_max_sec = 55
duration_avg_sec = 45
words_min = 115
words_max = 170
description = "Sustained attention and nuanced topic development."

[[buckets]]
name = "extended"
count = 5000
turn_min = 10
turn_max = 14
duration_min_sec = 55
duration_max_sec = 90
duration_avg_sec = 65
words_min = 170
words_max = 260
description = "Story arcs, debates, and long-range coherence."
